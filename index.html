<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MatrixCode - Loading Sequence</title>
    <style>
        :root {
            --bg-dark-core: radial-gradient(circle at 50% 50%, #0c0202, #040000, #000000);
            --neon-red: #ff2a2a;
            --neon-pink: #ff0055;
            --text-light: #fbebeb;
            --glass-border: rgba(255, 42, 42, 0.22);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark-core); color: var(--text-light); overflow: hidden; font-size: 13px; }

        .orb-matrix-1 { position: absolute; width: 150px; height: 150px; background: var(--neon-red); filter: blur(90px); opacity: 0.12; top: -10px; left: -10px; pointer-events: none; }
        .orb-matrix-2 { position: absolute; width: 180px; height: 180px; background: var(--neon-pink); filter: blur(100px); opacity: 0.08; bottom: -30px; right: -30px; pointer-events: none; }

        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #040000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-shadow: inset 0 0 100px rgba(255, 42, 42, 0.15); overflow: hidden;
        }

        .binary-rain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            font-family: 'Consolas', monospace; font-size: 10px; color: rgba(255, 42, 42, 0.04);
            line-height: 12px; pointer-events: none; user-select: none;
            display: flex; justify-content: space-between; overflow: hidden;
        }
        .binary-column { display: flex; flex-direction: column; animation: dropRain 4s linear infinite; }
        .binary-column:nth-child(even) { animation-duration: 2.5s; opacity: 0.6; }
        @keyframes dropRain { 0% { transform: translateY(-50%); } 100% { transform: translateY(0%); } }

        .cyber-core-container {
            position: relative; width: 130px; height: 130px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }
        .cyber-ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed rgba(255, 42, 42, 0.4); border-radius: 40%;
            animation: spinRing 8s linear infinite; box-shadow: 0 0 20px rgba(255, 42, 42, 0.1);
        }
        .cyber-ring-inner {
            position: absolute; width: 80%; height: 80%;
            border: 1px double var(--neon-pink); border-radius: 50%;
            animation: spinRingBack 4s linear infinite; opacity: 0.7;
        }
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinRingBack { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .hacker-badge {
            width: 50px; height: 45px; position: relative; background: transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: pulseGlow 1.5s ease-in-out infinite alternate;
        }
        .hacker-badge::before {
            content: ''; position: absolute; top: 0; width: 40px; height: 32px;
            background: var(--neon-red); border-radius: 20px 20px 8px 8px;
            box-shadow: 0 0 25px var(--neon-red);
        }
        .hacker-badge::after {
            content: ''; position: absolute; bottom: 0; width: 22px; height: 15px;
            background: var(--neon-red); border-radius: 2px; border-top: 3px solid #040000;
        }
        .skull-eyes { position: absolute; top: 12px; width: 28px; display: flex; justify-content: space-between; z-index: 2; }
        .skull-eyes span { width: 8px; height: 8px; background: #040000; border-radius: 50%; }
        @keyframes pulseGlow { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; } }

        .matrix-coder-title {
            font-family: 'Consolas', monospace; font-size: 22px; font-weight: 900;
            letter-spacing: 5px; margin-bottom: 25px; text-align: center; user-select: none;
        }
        .matrix-coder-title .text-white { color: #FFFFFF; text-shadow: 0 0 8px rgba(255, 42, 42, 0.7); }
        .matrix-coder-title .text-red { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 42, 42, 0.9); }

        .hacker-console {
            width: 100%; max-width: 320px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,42,42,0.15); border-radius: 8px;
            padding: 10px 14px; font-family: 'Consolas', monospace; font-size: 10.5px;
            color: #ff4444; min-height: 52px; margin-bottom: 20px; line-height: 1.4;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        .matrix-progress-title {
            font-family: 'Consolas', monospace; font-size: 11px; font-weight: bold;
            color: var(--text-light); letter-spacing: 2px; margin-bottom: 8px;
            text-shadow: 0 0 5px var(--neon-red);
        }
        .matrix-progress-wrapper { width: 100%; max-width: 280px; display: flex; align-items: center; gap: 8px; }
        .matrix-progress-bar-container {
            flex: 1; height: 14px; background: rgba(255, 42, 42, 0.03);
            border: 1px solid var(--glass-border); border-radius: 4px;
            padding: 2px; overflow: hidden; display: flex; gap: 2px;
        }
        .progress-block { height: 100%; width: 8%; background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); opacity: 0; }
        .progress-block.filled { opacity: 1; }
        .matrix-counter { font-family: 'Consolas', monospace; font-size: 11px; font-weight: bold; color: var(--neon-pink); width: 35px; text-align: right; }
    </style>
</head>
<body>

    <div class="orb-matrix-1"></div>
    <div class="orb-matrix-2"></div>

    <div class="splash-screen" id="splash-node">
        <div class="binary-rain" id="binary-rain-box"></div>
        
        <div class="cyber-core-container">
            <div class="cyber-ring"></div>
            <div class="cyber-ring-inner"></div>
            <div class="hacker-badge">
                <div class="skull-eyes"><span></span><span></span></div>
            </div>
        </div>

        <div class="matrix-coder-title">
            <span class="text-white">MATRIX</span> <span class="text-red">CODER</span>
        </div>

        <div class="hacker-console" id="hacker-logs-box">> SECURE SYSTEM OVERRIDE ACTIVE...</div>

        <div class="matrix-progress-title">HACKER SEQUENCE COMPILING</div>
        <div class="matrix-progress-wrapper">
            <div class="matrix-progress-bar-container" id="bar-blocks-node">
                <div class="progress-block"></div><div class="progress-block"></div>
                <div class="progress-block"></div><div class="progress-block"></div>
                <div class="progress-block"></div><div class="progress-block"></div>
                <div class="progress-block"></div><div class="progress-block"></div>
                <div class="progress-block"></div><div class="progress-block"></div>
            </div>
            <div class="matrix-counter" id="progress-percent-node">0%</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            generateBinaryRainMatrix();
            runHackerProgressSequence();
        };

        function generateBinaryRainMatrix() {
            const rainBox = document.getElementById("binary-rain-box");
            const columnsCount = Math.floor(window.innerWidth / 15);
            for(let i=0; i<columnsCount; i++) {
                let col = document.createElement("div");
                col.className = "binary-column";
                let textStr = "";
                for(let j=0; j<25; j++) { textStr += Math.round(Math.random()) + "<br>"; }
                col.innerHTML = textStr;
                col.style.animationDelay = (Math.random() * 2) + "s";
                rainBox.appendChild(col);
            }
        }

        function runHackerProgressSequence() {
            const logsBox = document.getElementById("hacker-logs-box");
            const percentageCounter = document.getElementById("progress-percent-node");
            const blockElements = document.querySelectorAll(".progress-block");
            
            const hackerLogs = [
                "> INITIALIZING MATRIX_CORE MATRIX...",
                "> OVERRIDING SANDBOX SECURITY WALLS...",
                "> INJECTING DYNAMIC RUNTIME ECOSYSTEMS...",
                "> MEMORY ALLOCATION STACK BUFFER: CLEAR",
                "> PIPELINE INTERNET CACHE CLEARED SUCCESSFULLY.",
                "> DEVICE CODES STREAM COMPILED READY."
            ];

            let progressCount = 0;
            let logStepIndex = 0;

            let matrixInterval = setInterval(() => {
                progressCount += 2;
                if(progressCount > 100) progressCount = 100;

                percentageCounter.innerHTML = progressCount + "%";

                let activeBlocksLimit = Math.floor(progressCount / 10);
                for(let i=0; i<activeBlocksLimit; i++) {
                    if(blockElements[i]) blockElements[i].classList.add("filled");
                }

                if(progressCount % 16 === 0 && logStepIndex < hackerLogs.length) {
                    logsBox.innerHTML = hackerLogs[logStepIndex];
                    logStepIndex++;
                }

                if(progressCount >= 100) {
                    clearInterval(matrixInterval);
                    // Automatic routing to matrix Linker Node
                    window.location.href = "matrix.html";
                }
            }, 30);
        }
    </script>
</body>
</html>
